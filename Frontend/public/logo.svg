<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Dark backing -->
  <circle cx="60" cy="60" r="55" fill="#0a0a0a"/>
  
  <!-- Outer lens ring - matte finish -->
  <circle cx="60" cy="60" r="45" fill="#151515" stroke="#1f1f1f" stroke-width="2"/>
  
  <!-- Main lens -->
  <circle cx="60" cy="60" r="35" fill="url(#matteBlackGradient)"/>
  
  <!-- Very subtle glass reflection for matte look -->
  <circle cx="60" cy="60" r="28" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="60" cy="60" r="22" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  
  <!-- Minimal lens coating -->
  <circle cx="60" cy="60" r="35" fill="rgba(120,120,150,0.04)"/>
  
  <!-- Subtle lens flare -->
  <ellipse cx="48" cy="48" rx="6" ry="9" fill="rgba(255,255,255,0.25)" transform="rotate(-40 48 48)"/>
  <circle cx="68" cy="52" r="3.5" fill="rgba(255,255,255,0.20)"/>
  <circle cx="52" cy="68" r="2.5" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Center with red tone -->
  <circle cx="60" cy="60" r="8" fill="#080808"/>
  <circle cx="60" cy="60" r="6" fill="url(#redCenterGradient)"/>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="matteBlackGradient">
      <stop offset="0%" style="stop-color:#242424;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#161616;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c0c0c;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="redCenterGradient">
      <stop offset="0%" style="stop-color:#ff3344;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#bb1122;stop-opacity:0.4" />
    </radialGradient>
  </defs>
</svg>